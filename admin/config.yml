backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "sections"
    label: "Page Sections"
    files:

      - name: "site"
        label: "Site Settings"
        file: "content/site.json"
        format: "json"
        fields:
          - { name: "title", label: "Page Title", widget: "string" }
          - { name: "description", label: "Meta Description", widget: "text" }
          - { name: "nav_logo", label: "Nav Logo Text", widget: "string" }
          - { name: "footer", label: "Footer Text", widget: "string" }

      - name: "hero"
        label: "Hero Section"
        file: "content/hero.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "headline_1", label: "Headline Line 1", widget: "string" }
          - { name: "headline_2", label: "Headline Line 2", widget: "string" }
          - { name: "tagline", label: "Tagline", widget: "string" }
          - { name: "background_image", label: "Background Image", widget: "image" }
          - { name: "background_alt", label: "Image Alt Text", widget: "string" }

      - name: "place"
        label: "The Place"
        file: "content/place.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "headline", label: "Headline", widget: "string" }
          - { name: "headline_turn", label: "Headline (Gold Italic)", widget: "string" }
          - { name: "body", label: "Body Text", widget: "text" }
          - { name: "image", label: "Image", widget: "image" }
          - { name: "image_alt", label: "Image Alt Text", widget: "string" }
          - name: "stats"
            label: "Stats"
            widget: "list"
            fields:
              - { name: "value", label: "Value", widget: "string" }
              - { name: "gold", label: "Gold Color", widget: "boolean", default: false }
              - { name: "label", label: "Label", widget: "string" }

      - name: "engines"
        label: "Seven Engines"
        file: "content/engines.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "headline", label: "Headline", widget: "string" }
          - { name: "headline_turn", label: "Headline (Gold Italic)", widget: "string" }
          - { name: "body", label: "Body Text", widget: "text" }
          - name: "engines"
            label: "Engines"
            widget: "list"
            fields:
              - { name: "number", label: "Number", widget: "string" }
              - { name: "name", label: "Name", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }

      - name: "hotel"
        label: "The Hotel"
        file: "content/hotel.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "headline", label: "Headline", widget: "string" }
          - { name: "headline_turn", label: "Headline (Gold Italic)", widget: "string" }
          - { name: "body", label: "Body Text", widget: "text" }
          - { name: "image", label: "Image", widget: "image" }
          - { name: "image_alt", label: "Image Alt Text", widget: "string" }
          - name: "stats"
            label: "Stats"
            widget: "list"
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "value", label: "Value", widget: "string" }
              - { name: "gold", label: "Gold Color", widget: "boolean", default: false }

      - name: "gallery"
        label: "Gallery"
        file: "content/gallery.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "subtitle", label: "Subtitle", widget: "string" }
          - name: "items"
            label: "Gallery Items"
            widget: "list"
            fields:
              - { name: "image", label: "Image", widget: "image" }
              - { name: "alt", label: "Alt Text", widget: "string" }
              - { name: "title", label: "Title", widget: "string" }
              - { name: "caption", label: "Caption", widget: "string" }

      - name: "operators"
        label: "Operators"
        file: "content/operators.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "headline", label: "Headline", widget: "string" }
          - { name: "headline_turn", label: "Headline (Gold Italic)", widget: "string" }
          - { name: "body", label: "Body Text", widget: "text" }
          - name: "operators"
            label: "Operators"
            widget: "list"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - { name: "role", label: "Role", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }

      - name: "cta"
        label: "Contact / CTA"
        file: "content/cta.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "headline", label: "Headline", widget: "string" }
          - { name: "headline_turn", label: "Headline (Gold Italic)", widget: "string" }
          - { name: "background_image", label: "Background Image", widget: "image" }
          - { name: "background_alt", label: "Image Alt Text", widget: "string" }
          - name: "steps"
            label: "Steps"
            widget: "list"
            field: { name: "step", label: "Step", widget: "string" }
          - name: "contacts"
            label: "Contacts"
            widget: "list"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - { name: "role", label: "Role", widget: "string" }
          - { name: "disclaimer", label: "Disclaimer", widget: "text" }
